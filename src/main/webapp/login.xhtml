<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Like Hero To Zero – Login</title>
    <h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body>
    <div class="page">
        <h1>Like Hero To Zero – Login</h1>

        <h:form id="loginForm">
            <h:panelGrid columns="2">
                <h:outputLabel for="user" value="Benutzername:" />
                <h:inputText id="user"
                             value="#{loginController.benutzer.name}"
                             required="true"
                             label="Benutzername" />

                <h:outputLabel for="pw" value="Passwort:" />
                <h:inputSecret id="pw"
                               value="#{loginController.benutzer.passwort}"
                               required="true"
                               label="Passwort" />

                <h:outputText value="" />
                <h:panelGroup>
                    <h:commandButton value="Login"
                                     action="#{loginController.login}" />
                    <h:commandButton value="Zurück"
                                     action="index.xhtml"
                                     immediate="true"
                                     styleClass="btn-secondary" />
                </h:panelGroup>
            </h:panelGrid>

            <h:messages globalOnly="true" styleClass="error" />
        </h:form>
    </div>
</h:body>
</html>
